<!-- Load custom fonts for the header -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
.contact-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.85rem;
    margin: 1.5rem 0;
    justify-content: center;
}

.contact-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.85rem;
    padding: 0.85rem 1.25rem;
    background: rgba(255,255,255,0.92);
    border: 1px solid rgba(255,255,255,0.75);
    border-radius: 999px;
    color: var(--section-light-text-color);
    text-decoration: none;
    font-weight: 500;
    transition: transform 0.25s ease, background-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
}

.contact-pill:hover,
.contact-pill:focus-visible {
    transform: translateY(-1px);
    background-color: var(--highlight);
    color: var(--highlight-contrast);
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
}

.contact-pill-icon {
    display: inline-flex;
    width: 3.2rem;
    height: 3.2rem;
    border-radius: 30%;
    align-items: center;
    justify-content: center;
    background: var(--highlight);
    color: var(--highlight-contrast);
    flex-shrink: 0;
}

.contact-pill:hover .contact-pill-icon,
.contact-pill:focus-visible .contact-pill-icon {
    background: rgba(255,255,255,0.95);
    color: var(--highlight);
}

.contact-pill-text {
    white-space: nowrap;
}

@media (max-width: 720px) {
    .contact-grid {
        flex-direction: column;
        align-items: stretch;
    }

    .contact-pill {
        justify-content: center;
        width: 100%;
    }
}
</style>

     Generated via https://favicon.io/favicon-generator/ -->

{{ with resources.Get "images/favicon.svg" }}<link rel="icon" type="image/svg+xml" href="{{ .RelPermalink }}" />{{ end }}
{{ range seq 9 4 }}{{ $size := pow 2 . }}{{ $file := replace "images/favicon-##x##.png" "##" $size }}{{ with resources.Get $file }}
